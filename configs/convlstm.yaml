# ConvLSTM hyperparameters — E2 experiment
# batch_size <= 4 on 64 GB nodes due to BPTT activation memory

model:
  hidden_channels: [32, 64]
  kernel_size: 3
  dropout: 0.1

training:
  batch_size: 4
  lr: 5.0e-4
  weight_decay: 1.0e-4
  max_epochs: 50
  patience: 10
  lr_patience: 5
  lr_factor: 0.5
  grad_clip: 1.0
