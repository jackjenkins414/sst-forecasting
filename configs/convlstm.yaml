# ConvLSTM hyperparameters — E2 experiment
# Parity-fixed 11 May 2026: batch_size and lr now match SpatialFlatLSTM (job 117)
# so E2 vs E1 is a controlled architectural comparison.
# hpc-03 / hpc-06 (128 GB) required for BPTT over L=90 at bs=16.

model:
  hidden_channels: [32, 64]
  kernel_size: 3
  dropout: 0.1

training:
  batch_size: 16   # matches LSTM E1 (job 117)
  lr: 1.0e-3       # matches LSTM E1 (job 117)
  weight_decay: 1.0e-4
  max_epochs: 50
  patience: 10
  lr_patience: 5
  lr_factor: 0.5
  grad_clip: 1.0
