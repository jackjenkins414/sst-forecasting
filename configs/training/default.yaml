# configs/training/default.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Default (Setonix single-GCD) training profile.
# ─────────────────────────────────────────────────────────────────────────────

seed: 42

max_epochs: 100
batch_size: 32
num_workers: 4
pin_memory: true

max_train_windows: 0   # 0 = use all
max_val_windows: 0

lr: 1.0e-3
weight_decay: 1.0e-4
grad_clip: 1.0

use_amp: true
amp_dtype: bfloat16    # preferred over fp16 on AMD MI250X

compile: false         # set true only after verifying ROCm support

patience: 10
min_delta: 1.0e-4

log_every_n_steps: 50
